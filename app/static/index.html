<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Assistant</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #e8eef4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app {
            width: 100%;
            max-width: 760px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
            box-shadow: 0 4px 40px rgba(0,0,0,0.15);
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .header-avatar {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.18);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .header-text h1 { font-size: 17px; font-weight: 700; color: #fff; }
        .header-text p  { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }

        .mode-badge {
            margin-left: auto;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.9);
            flex-shrink: 0;
            transition: background 0.3s;
        }

        /* ── Messages ── */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .msg-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .msg-row.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; color: #fff;
            flex-shrink: 0;
        }

        .msg-row.bot  .msg-avatar { background: #1e3a5f; font-size: 15px; }
        .msg-row.user .msg-avatar { background: #64748b; }

        .bubble {
            max-width: 78%;
            padding: 11px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.65;
        }

        .msg-row.bot  .bubble {
            background: #f1f5f9;
            color: #1e293b;
            border-bottom-left-radius: 4px;
        }

        .msg-row.user .bubble {
            background: #2563eb;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        /* ── Chip buttons ── */
        .chip-row {
            padding-left: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            padding: 7px 18px;
            border-radius: 20px;
            border: 2px solid #2563eb;
            background: #fff;
            color: #2563eb;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .chip:hover:not(:disabled) { background: #2563eb; color: #fff; }
        .chip:disabled { opacity: 0.4; cursor: default; }

        /* ── Result elements ── */
        .result-block { margin-top: 10px; }
        .result-block + .result-block { margin-top: 14px; }

        .result-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #64748b;
            margin-bottom: 7px;
        }

        .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }

        .tag {
            padding: 3px 11px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .tag.match   { background: #dcfce7; color: #15803d; }
        .tag.missing { background: #fee2e2; color: #b91c1c; }

        .summary-box {
            background: #eff6ff;
            border-left: 3px solid #2563eb;
            border-radius: 0 6px 6px 0;
            padding: 10px 14px;
            font-size: 13px;
            color: #1e40af;
            line-height: 1.55;
            margin-top: 12px;
        }

        .bullet-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
        .bullet-list li {
            background: #f8fafc;
            border-left: 3px solid #2563eb;
            border-radius: 0 6px 6px 0;
            padding: 9px 13px;
            font-size: 13px;
            line-height: 1.55;
            color: #1e293b;
        }

        .sugg-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
        .sugg-list li {
            font-size: 13px;
            color: #475569;
            padding-left: 18px;
            position: relative;
            line-height: 1.5;
        }
        .sugg-list li::before { content: '→'; position: absolute; left: 0; color: #2563eb; }

        /* ── Loading dots ── */
        .dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
        .dots span {
            width: 8px; height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: blink 1.1s ease-in-out infinite;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { transform: scale(1); opacity: 0.6; }
            40%            { transform: scale(1.3); opacity: 1; }
        }

        /* ── Input area ── */
        .input-area {
            border-top: 1px solid #e2e8f0;
            padding: 14px 18px 16px;
            background: #f8fafc;
            flex-shrink: 0;
        }

        .input-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
            min-height: 16px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #chatInput {
            flex: 1;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            line-height: 1.5;
            transition: border-color 0.15s;
            background: #fff;
            overflow-y: auto;
        }

        #chatInput:focus { border-color: #2563eb; }
        #chatInput.single { height: 44px; }
        #chatInput.multi  { min-height: 130px; max-height: 260px; }

        #sendBtn {
            width: 44px; height: 44px;
            border-radius: 12px;
            border: none;
            background: #2563eb;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        #sendBtn:hover:not(:disabled) { background: #1d4ed8; }
        #sendBtn:disabled { background: #94a3b8; cursor: not-allowed; }

        code {
            background: #f1f5f9;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-avatar">🤖</div>
        <div class="header-text">
            <h1>AI Resume Assistant</h1>
            <p>Skill gap analysis &amp; resume improvement — no API key required</p>
        </div>
        <span class="mode-badge" id="modeBadge">checking…</span>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <div class="input-hint" id="inputHint"></div>
        <div class="input-row">
            <textarea id="chatInput" class="single" placeholder="Type a message…" rows="1"></textarea>
            <button id="sendBtn" title="Send">&#9658;</button>
        </div>
    </div>
</div>

<script>'use strict';

// ── Config ──────────────────────────────────────────────────────────────────
// Empty string = same origin (works when served by FastAPI at http://localhost:8000)
const API = '';

// ── State ────────────────────────────────────────────────────────────────────
let state      = 'greeting';  // greeting | get_resume | get_job | result
let action     = null;        // 'analyze' | 'improve'
let resumeText = '';
let jobText    = '';

// ── DOM refs ─────────────────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const chatInput  = document.getElementById('chatInput');
const sendBtn    = document.getElementById('sendBtn');
const inputHint  = document.getElementById('inputHint');
const modeBadge  = document.getElementById('modeBadge');

// ── Render helpers ────────────────────────────────────────────────────────────
function scrollDown() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addBubble(role, buildFn) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = role === 'bot' ? '🤖' : 'You';

    const bub = document.createElement('div');
    bub.className = 'bubble';
    buildFn(bub);

    row.appendChild(av);
    row.appendChild(bub);
    messagesEl.appendChild(row);
    scrollDown();
    return { row, bub };
}

function botText(html) {
    return addBubble('bot', b => { b.innerHTML = html; });
}

function userText(html) {
    return addBubble('user', b => { b.innerHTML = html; });
}

function botDom(buildFn) {
    return addBubble('bot', buildFn);
}

function addDots() {
    return addBubble('bot', b => {
        b.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
    });
}

function addChips(options, onPick) {
    const row = document.createElement('div');
    row.className = 'chip-row';
    options.forEach(({ label, value }) => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.textContent = label;
        btn.onclick = () => {
            row.querySelectorAll('.chip').forEach(c => c.disabled = true);
            onPick(value, label);
        };
        row.appendChild(btn);
    });
    messagesEl.appendChild(row);
    scrollDown();
}

function el(tag, cls) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    return e;
}

function resultBlock(labelText) {
    const b = el('div', 'result-block');
    const l = el('div', 'result-label');
    l.textContent = labelText;
    b.appendChild(l);
    return b;
}

function setHint(text) { inputHint.textContent = text; }

function setInputMode(multi) {
    chatInput.className = multi ? 'multi' : 'single';
    chatInput.placeholder = multi
        ? 'Paste text here, then click Send…'
        : 'Type a message…';
}

// ── API calls ─────────────────────────────────────────────────────────────────
async function checkServerMode() {
    try {
        const r = await fetch(API + '/mode');
        if (!r.ok) throw new Error();
        const d = await r.json();
        modeBadge.textContent = d.mock ? '● Mock Mode' : '● AI Live';
        modeBadge.style.background = d.mock
            ? 'rgba(251,191,36,0.3)'
            : 'rgba(34,197,94,0.3)';
    } catch {
        modeBadge.textContent = '● Server Offline';
        modeBadge.style.background = 'rgba(239,68,68,0.3)';
    }
}

async function callAPI() {
    state = 'result';
    setInputMode(false);
    setHint('');
    chatInput.value = '';
    sendBtn.disabled = true;

    const { row: dotRow } = addDots();
    const endpoint = action === 'analyze' ? '/analyze' : '/improve-resume';

    try {
        const res = await fetch(API + endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ resume_text: resumeText, job_description_text: jobText }),
        });

        dotRow.remove();
        sendBtn.disabled = false;

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            botText(`<span style="color:#dc2626">⚠️ Error ${res.status}: ${err.detail || 'Something went wrong.'}</span>`);
        } else {
            renderResult(await res.json());
        }
    } catch {
        dotRow.remove();
        sendBtn.disabled = false;
        botText(
            '⚠️ Could not reach the server.<br>' +
            '<small>Make sure it\'s running: <code>uvicorn app.main:app --reload</code></small>'
        );
    }

    offerNext();
}

// ── Result rendering ──────────────────────────────────────────────────────────
function renderResult(data) {
    if (action === 'analyze') renderAnalyze(data);
    else renderImprove(data);
}

function renderAnalyze(data) {
    botDom(bub => {
        if (data.matching_skills?.length) {
            const blk = resultBlock('✅ Matching Skills');
            const row = el('div', 'tag-row');
            data.matching_skills.forEach(s => {
                const t = el('span', 'tag match');
                t.textContent = s;
                row.appendChild(t);
            });
            blk.appendChild(row);
            bub.appendChild(blk);
        }

        if (data.missing_skills?.length) {
            const blk = resultBlock('❌ Missing Skills');
            const row = el('div', 'tag-row');
            data.missing_skills.forEach(s => {
                const t = el('span', 'tag missing');
                t.textContent = s;
                row.appendChild(t);
            });
            blk.appendChild(row);
            bub.appendChild(blk);
        }

        if (data.summary) {
            const box = el('div', 'summary-box');
            box.textContent = data.summary;
            bub.appendChild(box);
        }
    });
}

function renderImprove(data) {
    botDom(bub => {
        if (data.improved_bullet_points?.length) {
            const blk = resultBlock('✏️ Improved Bullets');
            const ul = el('ul', 'bullet-list');
            data.improved_bullet_points.forEach(b => {
                const li = document.createElement('li');
                li.textContent = b;
                ul.appendChild(li);
            });
            blk.appendChild(ul);
            bub.appendChild(blk);
        }

        if (data.suggestions?.length) {
            const blk = resultBlock('💡 Suggestions');
            const ul = el('ul', 'sugg-list');
            data.suggestions.forEach(s => {
                const li = document.createElement('li');
                li.textContent = s;
                ul.appendChild(li);
            });
            blk.appendChild(ul);
            bub.appendChild(blk);
        }
    });
}

// ── Conversation flow ─────────────────────────────────────────────────────────
function greet() {
    state = 'greeting';
    action = null; resumeText = ''; jobText = '';
    setInputMode(false);
    setHint('');
    chatInput.value = '';
    sendBtn.disabled = false;

    botText('<strong>Hi! I\'m your AI Resume Assistant.</strong><br>I can help you with two things — pick one to get started:');
    addChips([
        { label: '🔍 Analyze Skill Gap',      value: 'analyze' },
        { label: '✏️ Improve Resume Bullets', value: 'improve' },
    ], (value, label) => {
        action = value;
        userText(label);
        askResume();
    });
}

function askResume() {
    state = 'get_resume';
    botText(
        'Paste your <strong>resume text</strong> below, then click Send.<br>' +
        '<small style="color:#64748b">Plain text is fine — no formatting needed.</small>'
    );
    setInputMode(true);
    setHint('Paste your full resume text, then click Send.');
    chatInput.focus();
}

function askJob() {
    state = 'get_job';
    botText('Now paste the <strong>job description</strong> you want to target:');
    setInputMode(true);
    setHint('Paste the job description text, then click Send.');
    chatInput.value = '';
    chatInput.focus();
}

function offerNext() {
    const other      = action === 'analyze' ? 'improve' : 'analyze';
    const otherLabel = other === 'analyze' ? '🔍 Analyze Skill Gap' : '✏️ Improve Resume Bullets';

    botText('What would you like to do next?');
    addChips([
        { label: otherLabel,    value: 'switch'  },
        { label: '🔄 Start Over', value: 'restart' },
    ], (value, label) => {
        userText(label);
        if (value === 'restart') {
            greet();
        } else {
            action = other;
            if (resumeText && jobText) {
                botText('Using the same resume and job description…');
                callAPI();
            } else {
                askResume();
            }
        }
    });
}

// ── Send handler ──────────────────────────────────────────────────────────────
function handleSend() {
    const val = chatInput.value.trim();
    if (!val) return;

    if (state === 'get_resume') {
        resumeText = val;
        const words = val.split(/\s+/).length;
        userText(`📄 Resume submitted <small style="opacity:.7">(${words} words)</small>`);
        chatInput.value = '';
        askJob();
    } else if (state === 'get_job') {
        jobText = val;
        const words = val.split(/\s+/).length;
        userText(`📋 Job description submitted <small style="opacity:.7">(${words} words)</small>`);
        chatInput.value = '';
        callAPI();
    }
}

sendBtn.addEventListener('click', handleSend);
chatInput.addEventListener('keydown', e => {
    // In single-line mode Enter submits; in multi-line Enter is a newline
    if (e.key === 'Enter' && !e.shiftKey && chatInput.classList.contains('single')) {
        e.preventDefault();
        handleSend();
    }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
checkServerMode();
greet();
</script>
</body>
</html>
